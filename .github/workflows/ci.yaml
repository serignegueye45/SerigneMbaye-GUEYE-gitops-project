name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: serignegueye45/serignembaye-gueye-gitops-app

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test image
        run: |
          docker build -t test-image ./app
          docker run --rm -d --name test-container -p 5000:5000 test-image
          sleep 3
          curl -f http://localhost:5000/api/whoami || (docker logs test-container && exit 1)
          docker stop test-container

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

- name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" charts/prenom-nom-app/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/prenom-nom-app/values.yaml
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]" || echo "No changes"
          git push
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./charts/prenom-nom-app
